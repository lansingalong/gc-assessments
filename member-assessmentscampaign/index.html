  <body>
    <div id="root"><p style="padding:20px;color:#333;font-family:sans-serif;">Loading app… if this message stays, check browser console for errors.</p></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.insertAdjacentHTML('afterbegin', '<div style="position:fixed;top:0;left:0;right:0;padding:12px 20px;font-family:monospace;color:#fff;font-size:12px;background:#c00;z-index:99999"><strong>JS Error:</strong> ' + (e.message||'unknown') + ' @ ' + (e.filename||'') + ':' + (e.lineno||'') + '</div>');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.insertAdjacentHTML('afterbegin', '<div style="position:fixed;top:0;left:0;right:0;padding:12px 20px;font-family:monospace;color:#fff;font-size:12px;background:#c00;z-index:99999"><strong>Unhandled:</strong> ' + String(e.reason) + '</div>');
      });
    </script>
  </body>
